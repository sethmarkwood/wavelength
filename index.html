<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavelength</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1035;
    --card: #251850;
    --accent1: #ff6b9d;
    --accent2: #c084fc;
    --accent3: #67e8f9;
    --accent4: #fbbf24;
    --text: #f1e8ff;
    --text-dim: #a78bcc;
    --success: #34d399;
    --danger: #f87171;
    --radius: 16px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(192, 132, 252, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 107, 157, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(103, 232, 249, 0.06) 0%, transparent 50%);
  }

  h1 {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    letter-spacing: -1px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 30px;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    border: 1px solid rgba(167, 139, 204, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .card h2 {
    font-size: 1.3rem;
    margin-bottom: 16px;
    color: var(--accent3);
  }

  .card h3 {
    font-size: 1rem;
    color: var(--accent2);
    margin-bottom: 12px;
    font-weight: 600;
  }

  button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  button:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: white;
  }

  .btn-secondary {
    background: rgba(167, 139, 204, 0.2);
    color: var(--text);
    border: 1px solid rgba(167, 139, 204, 0.3);
  }

  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    color: white;
  }

  .btn-small {
    padding: 10px 20px;
    font-size: 0.9rem;
  }

  input[type="text"], textarea {
    font-family: inherit;
    font-size: 1rem;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(167, 139, 204, 0.25);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    width: 100%;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent2);
  }

  textarea { resize: vertical; min-height: 60px; }

  .spectrum-bar {
    position: relative;
    height: 64px;
    border-radius: 32px;
    margin: 16px 0;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .spectrum-gradient {
    width: 100%;
    height: 100%;
    border-radius: 32px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  }

  .spectrum-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .spectrum-labels .left { color: var(--accent1); }
  .spectrum-labels .right { color: var(--accent3); }

  .target-zone {
    position: absolute;
    top: 0;
    height: 100%;
    background: rgba(251, 191, 36, 0.35);
    border-left: 3px solid var(--accent4);
    border-right: 3px solid var(--accent4);
    pointer-events: none;
    border-radius: 4px;
  }

  .target-center {
    position: absolute;
    top: 50%;
    width: 4px;
    height: 70%;
    transform: translate(-50%, -50%);
    background: var(--accent4);
    border-radius: 2px;
    pointer-events: none;
  }

  .guess-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--accent2);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    pointer-events: none;
    transition: left 0.15s ease-out;
    z-index: 5;
  }

  .guess-marker::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    background: var(--accent2);
    border-radius: 50%;
  }

  .clue-display {
    background: rgba(192, 132, 252, 0.1);
    border: 1px solid rgba(192, 132, 252, 0.25);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 10px 0;
    font-size: 1.15rem;
    font-weight: 600;
    text-align: center;
    color: var(--accent4);
  }

  .round-indicator {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .round-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(167, 139, 204, 0.25);
    transition: all 0.3s;
  }

  .round-dot.active {
    background: var(--accent2);
    box-shadow: 0 0 12px rgba(192, 132, 252, 0.5);
    transform: scale(1.3);
  }

  .round-dot.done {
    background: var(--success);
  }

  .score-display {
    text-align: center;
    padding: 20px;
  }

  .score-big {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent4), var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-label {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .score-row {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
  }

  .link-box {
    background: rgba(0, 0, 0, 0.4);
    border: 1px dashed rgba(167, 139, 204, 0.4);
    border-radius: 12px;
    padding: 16px;
    margin: 16px 0;
    word-break: break-all;
    font-size: 0.85rem;
    color: var(--text-dim);
    max-height: 100px;
    overflow-y: auto;
  }

  .name-input-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }

  .name-input-row input { flex: 1; }

  .round-result {
    margin: 16px 0;
    padding: 16px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 12px;
  }

  .round-result .spectrum-bar { cursor: default; }

  .points-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.95rem;
    margin-top: 8px;
  }

  .points-4 { background: rgba(52, 211, 153, 0.2); color: var(--success); }
  .points-3 { background: rgba(251, 191, 36, 0.2); color: var(--accent4); }
  .points-2 { background: rgba(255, 107, 157, 0.2); color: var(--accent1); }
  .points-0 { background: rgba(248, 113, 113, 0.15); color: var(--danger); }

  .fade-in {
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .instructions {
    color: var(--text-dim);
    font-size: 0.92rem;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .total-scores {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin: 16px 0;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .total-scores span { padding: 8px 20px; border-radius: 10px; }
  .total-scores .p1 { background: rgba(255, 107, 157, 0.15); color: var(--accent1); }
  .total-scores .p2 { background: rgba(103, 232, 249, 0.15); color: var(--accent3); }

  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #000;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .copy-toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Pack Selection ===== */
  .pack-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 16px 0;
  }

  .pack-card {
    background: rgba(0, 0, 0, 0.25);
    border: 2px solid rgba(167, 139, 204, 0.2);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }

  .pack-card:hover {
    border-color: var(--accent2);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  }

  .pack-card.selected {
    border-color: var(--accent4);
    background: rgba(251, 191, 36, 0.08);
    box-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
  }

  .pack-icon {
    font-size: 2.2rem;
    margin-bottom: 8px;
    display: block;
  }

  .pack-name {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .pack-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .pack-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-classic { background: rgba(192, 132, 252, 0.2); color: var(--accent2); }
  .badge-twenties { background: rgba(103, 232, 249, 0.2); color: var(--accent3); }
  .badge-food { background: rgba(255, 107, 157, 0.2); color: var(--accent1); }
  .badge-absurd { background: rgba(251, 191, 36, 0.2); color: var(--accent4); }

  @media (max-width: 500px) {
    h1 { font-size: 2rem; }
    .card { padding: 20px; }
    .spectrum-bar { height: 54px; }
    .guess-marker { width: 28px; height: 28px; }
    .guess-marker::after { width: 10px; height: 10px; }
    .pack-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  return activePack ? activePack.spectrums : PACKS.classic.spectrums;
}

// ============ STATE ENCODING ============
function encodeState(state) {
  const json = JSON.stringify(state);
  return btoa(unescape(encodeURIComponent(json)));
}

function decodeState(encoded) {
  try {
    const json = decodeURIComponent(escape(atob(encoded)));
    return JSON.parse(json);
  } catch(e) {
    return null;
  }
}

function getStateFromURL() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  return decodeState(hash);
}

function generateLink(state) {
  const encoded = encodeState(state);
  return window.location.origin + window.location.pathname + '#' + encoded;
}

// ============ GAME LOGIC ============
function pickSpectrums(count, exclude) {
  const spectrums = getSpectrums();
  const available = spectrums.map((s, i) => i).filter(i => !exclude.includes(i));
  const picked = [];
  while (picked.length < count && available.length > 0) {
    const idx = Math.floor(Math.random() * available.length);
    picked.push(available[idx]);
    available.splice(idx, 1);
  }
  return picked;
}

function generateTarget() {
  return Math.floor(Math.random() * 81) + 10;
}

function scoreGuess(guess, target) {
  const diff = Math.abs(guess - target);
  if (diff <= 5) return 4;
  if (diff <= 12) return 3;
  if (diff <= 20) return 2;
  return 0;
}

// ============ RENDER HELPERS ============
const $ = id => document.getElementById(id);
const app = () => $('app');

function showToast(msg) {
  const toast = $('toast');
  toast.textContent = msg || 'Link copied!';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function renderSpectrumBar(spectrum, opts = {}) {
  const { target, guess, interactive, id } = opts;
  let html = `<div class="spectrum-bar" ${interactive ? `id="${id}" data-interactive="true"` : ''}>`;
  html += `<div class="spectrum-gradient"></div>`;

  if (target !== undefined) {
    const zoneLeft = Math.max(0, target - 8);
    const zoneWidth = 16;
    html += `<div class="target-zone" style="left:${zoneLeft}%;width:${zoneWidth}%"></div>`;
    html += `<div class="target-center" style="left:${target}%"></div>`;
  }

  if (guess !== undefined) {
    html += `<div class="guess-marker" style="left:${guess}%"></div>`;
  } else if (interactive) {
    html += `<div class="guess-marker" id="${id}-marker" style="left:50%"></div>`;
  }

  html += `</div>`;
  html += `<div class="spectrum-labels"><span class="left">${spectrum[0]}</span><span class="right">${spectrum[1]}</span></div>`;
  return html;
}

function setupInteractiveSpectrum(barId, callback) {
  const bar = $(barId);
  if (!bar) return;
  let dragging = false;

  function updatePos(e) {
    const rect = bar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let pct = ((clientX - rect.left) / rect.width) * 100;
    pct = Math.max(2, Math.min(98, pct));
    const marker = $(`${barId}-marker`);
    if (marker) marker.style.left = pct + '%';
    if (callback) callback(Math.round(pct));
  }

  bar.addEventListener('mousedown', e => { dragging = true; updatePos(e); });
  bar.addEventListener('touchstart', e => { dragging = true; updatePos(e); }, { passive: true });
  document.addEventListener('mousemove', e => { if (dragging) updatePos(e); });
  document.addEventListener('touchmove', e => { if (dragging) updatePos(e); }, { passive: true });
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });
  bar.addEventListener('click', updatePos);
}

function renderRoundDots(total, current, completed) {
  let html = '<div class="round-indicator">';
  for (let i = 0; i < total; i++) {
    const cls = i < completed ? 'done' : i === current ? 'active' : '';
    html += `<div class="round-dot ${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

function pointsBadge(pts) {
  const cls = pts >= 4 ? 'points-4' : pts >= 3 ? 'points-3' : pts >= 2 ? 'points-2' : 'points-0';
  const label = pts === 4 ? 'Bullseye! +4' : pts === 3 ? 'Close! +3' : pts === 2 ? 'Warm +2' : 'Miss +0';
  return `<span class="points-badge ${cls}">${label}</span>`;
}

// ============ SCREENS ============

function showHome() {
  app().innerHTML = `
    <div class="card fade-in">
      <h2>How It Works</h2>
      <p class="instructions">
        Wavelength is an async game for 2 players. Each round, you see a spectrum between two
        extremes (like "Hot ↔ Cold") and a secret target position on that spectrum.
        Give a clue so your partner can guess where the target is!
      </p>
      <p class="instructions">
        You'll take turns giving 3 clues each. After you finish, you'll get a link to
        send to your partner. They open it, guess your clues, then write their own — and send the link back.
      </p>
      <div class="name-input-row">
        <input type="text" id="player-name" placeholder="Your name" maxlength="20" />
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="showPackSelection()">Start New Game</button>
      </div>
    </div>
  `;

  const saved = sessionVars.playerName;
  if (saved) $('player-name').value = saved;
}

function showPackSelection() {
  const name = $('player-name').value.trim() || 'Player 1';
  sessionVars.playerName = name;

  let packsHtml = '';
  PACK_ORDER.forEach(packId => {
    const p = PACKS[packId];
    packsHtml += `
      <div class="pack-card ${activePackId === packId ? 'selected' : ''}" id="pack-${packId}" onclick="selectPack('${packId}')">
        <span class="pack-icon">${p.icon}</span>
        <div class="pack-name">${p.name}</div>
        <div class="pack-desc">${p.desc}</div>
        <span class="pack-badge ${p.badge}">${p.spectrums.length} spectrums</span>
      </div>
    `;
  });

  app().innerHTML = `
    <div class="card fade-in">
      <h2>Choose a Pack</h2>
      <p class="instructions">
        Pick a spectrum pack for your game. Both players will use the same pack throughout.
      </p>
      <div class="pack-grid">
        ${packsHtml}
      </div>
      <div class="btn-row">
        <button class="btn-secondary btn-small" onclick="showHome()">← Back</button>
        <button class="btn-primary" id="start-btn" onclick="startNewGame()" ${!activePackId ? 'style="opacity:0.5;pointer-events:none"' : ''}>Start Game →</button>
      </div>
    </div>
  `;
}

function selectPack(packId) {
  activePackId = packId;
  activePack = PACKS[packId];

  // Update visual selection
  PACK_ORDER.forEach(pid => {
    const el = $('pack-' + pid);
    if (el) el.classList.toggle('selected', pid === packId);
  });

  // Enable start button
  const btn = $('start-btn');
  if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
}

function startNewGame() {
  if (!activePackId) return;

  const usedIndices = [];
  const rounds = [];
  for (let i = 0; i < ROUNDS_PER_TURN; i++) {
    const indices = pickSpectrums(1, usedIndices);
    usedIndices.push(...indices);
    rounds.push({
      spectrumIdx: indices[0],
      target: generateTarget(),
      clue: ''
    });
  }

  currentSession = {
    phase: 'clue-giving',
    p1Name: sessionVars.playerName,
    p1Rounds: rounds,
    currentRound: 0,
    usedIndices: usedIndices,
    packId: activePackId,
    history: []
  };

  showClueGiving();
}

function showClueGiving() {
  const s = currentSession;
  const round = s.p1Rounds[s.currentRound];
  const spectrum = getSpectrums()[round.spectrumIdx];

  app().innerHTML = `
    <div class="card fade-in">
      ${renderRoundDots(ROUNDS_PER_TURN, s.currentRound, s.currentRound)}
      <h2>Give a Clue</h2>
      <p class="instructions">
        The target is marked on the spectrum below. Type a clue that hints
        at where the target falls between these two extremes.
      </p>
      ${renderSpectrumBar(spectrum, { target: round.target })}
      <div style="margin-top:16px">
        <input type="text" id="clue-input" placeholder="Type your clue..." maxlength="100" value="${escapeHtml(round.clue)}" />
      </div>
      <div class="btn-row">
        ${s.currentRound > 0 ? '<button class="btn-secondary btn-small" onclick="prevClueRound()">← Back</button>' : ''}
        <button class="btn-primary" onclick="submitClue()">${s.currentRound === ROUNDS_PER_TURN - 1 ? 'Finish & Get Link' : 'Next →'}</button>
      </div>
    </div>
  `;

  $('clue-input').focus();
  $('clue-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitClue(); });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function submitClue() {
  const clue = $('clue-input').value.trim();
  if (!clue) { $('clue-input').focus(); return; }

  currentSession.p1Rounds[currentSession.currentRound].clue = clue;

  if (currentSession.currentRound < ROUNDS_PER_TURN - 1) {
    currentSession.currentRound++;
    showClueGiving();
  } else {
    showGeneratedLink();
  }
}

function prevClueRound() {
  const clue = $('clue-input').value.trim();
  currentSession.p1Rounds[currentSession.currentRound].clue = clue;
  currentSession.currentRound--;
  showClueGiving();
}

function showGeneratedLink() {
  const s = currentSession;

  const shareState = {
    phase: 'guess',
    p1Name: s.p1Name,
    pack: s.packId || activePackId,
    rounds: s.p1Rounds.map(r => ({
      si: r.spectrumIdx,
      t: r.target,
      c: r.clue
    })),
    usedIndices: s.usedIndices,
    history: s.history || []
  };

  const link = generateLink(shareState);

  app().innerHTML = `
    <div class="card fade-in">
      <h2>Send This Link!</h2>
      <p class="instructions">
        Your clues are locked in. Copy this link and send it to your partner.
        When they open it, they'll see your clues and try to guess where the target is on each spectrum.
      </p>
      <div class="link-box" id="link-text">${link}</div>
      <div class="btn-row">
        <button class="btn-success" onclick="copyLink()">Copy Link</button>
      </div>
    </div>
  `;
}

function copyLink() {
  const linkText = $('link-text').textContent;
  navigator.clipboard.writeText(linkText).then(() => {
    showToast('Link copied!');
  }).catch(() => {
    const range = document.createRange();
    range.selectNodeContents($('link-text'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    showToast('Select all & copy manually');
  });
}

// ============ GUESSING PHASE ============

function startGuessing(state) {
  // Set the active pack from the game state
  activePackId = state.pack || 'classic';
  activePack = PACKS[activePackId];

  currentSession = {
    phase: 'guessing',
    p1Name: state.p1Name,
    packId: activePackId,
    rounds: state.rounds.map(r => ({
      spectrumIdx: r.si,
      target: r.t,
      clue: r.c,
      guess: 50
    })),
    usedIndices: state.usedIndices,
    history: state.history || [],
    currentRound: 0,
    p2Name: ''
  };

  showNameEntry();
}

function showNameEntry() {
  const pack = PACKS[activePackId];
  app().innerHTML = `
    <div class="card fade-in">
      <h2>${escapeHtml(currentSession.p1Name)} sent you clues!</h2>
      <p class="instructions">
        ${escapeHtml(currentSession.p1Name)} has given you ${ROUNDS_PER_TURN} clues using the
        <strong>${pack.icon} ${pack.name}</strong> pack.
        For each one, drag the marker to where you think the hidden target is.
      </p>
      <div class="name-input-row">
        <input type="text" id="p2-name" placeholder="Your name" maxlength="20" value="${sessionVars.playerName || ''}" />
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="beginGuessing()">Let's Go!</button>
      </div>
    </div>
  `;
  $('p2-name').focus();
}

function beginGuessing() {
  const name = $('p2-name').value.trim() || 'Player 2';
  currentSession.p2Name = name;
  sessionVars.playerName = name;
  showGuessRound();
}

function showGuessRound() {
  const s = currentSession;
  const round = s.rounds[s.currentRound];
  const spectrum = getSpectrums()[round.spectrumIdx];
  const barId = 'guess-bar';

  app().innerHTML = `
    <div class="card fade-in">
      ${renderRoundDots(ROUNDS_PER_TURN, s.currentRound, s.currentRound)}
      <h2>Guess the Target</h2>
      <p class="instructions">${escapeHtml(s.p1Name)}'s clue:</p>
      <div class="clue-display">${escapeHtml(round.clue)}</div>
      ${renderSpectrumBar(spectrum, { interactive: true, id: barId })}
      <div class="btn-row">
        ${s.currentRound > 0 ? '<button class="btn-secondary btn-small" onclick="prevGuessRound()">← Back</button>' : ''}
        <button class="btn-primary" onclick="submitGuess()">${s.currentRound === ROUNDS_PER_TURN - 1 ? 'See Results!' : 'Lock In & Next →'}</button>
      </div>
    </div>
  `;

  const marker = $(`${barId}-marker`);
  if (marker) marker.style.left = round.guess + '%';

  setupInteractiveSpectrum(barId, val => {
    s.rounds[s.currentRound].guess = val;
  });
}

function prevGuessRound() {
  currentSession.currentRound--;
  showGuessRound();
}

function submitGuess() {
  const s = currentSession;
  if (s.currentRound < ROUNDS_PER_TURN - 1) {
    s.currentRound++;
    showGuessRound();
  } else {
    showGuessResults();
  }
}

function showGuessResults() {
  const s = currentSession;
  let totalPts = 0;
  let roundsHtml = '';

  s.rounds.forEach((round, i) => {
    const spectrum = getSpectrums()[round.spectrumIdx];
    const pts = scoreGuess(round.guess, round.target);
    totalPts += pts;

    roundsHtml += `
      <div class="round-result">
        <h3>Round ${i + 1}</h3>
        <div class="clue-display">${escapeHtml(round.clue)}</div>
        ${renderSpectrumBar(spectrum, { target: round.target, guess: round.guess })}
        <div style="text-align:center">${pointsBadge(pts)}</div>
      </div>
    `;
  });

  app().innerHTML = `
    <div class="card fade-in">
      <h2>Results — Guessing ${escapeHtml(s.p1Name)}'s Clues</h2>
      <div class="score-display">
        <div class="score-big">${totalPts} / ${ROUNDS_PER_TURN * 4}</div>
        <div class="score-label">points scored</div>
      </div>
      ${roundsHtml}
      <div class="btn-row">
        <button class="btn-primary" onclick="startP2Clues(${totalPts})">Now Give Your Clues →</button>
      </div>
    </div>
  `;
}

function startP2Clues(guessScore) {
  const s = currentSession;

  const turnResult = {
    cluer: s.p1Name,
    guesser: s.p2Name,
    rounds: s.rounds.map(r => ({
      si: r.spectrumIdx,
      t: r.target,
      c: r.clue,
      g: r.guess,
      pts: scoreGuess(r.guess, r.target)
    })),
    totalPts: guessScore
  };

  const history = [...(s.history || []), turnResult];

  const newUsed = [...s.usedIndices];
  const newRounds = [];
  for (let i = 0; i < ROUNDS_PER_TURN; i++) {
    const indices = pickSpectrums(1, newUsed);
    newUsed.push(...indices);
    newRounds.push({
      spectrumIdx: indices[0],
      target: generateTarget(),
      clue: ''
    });
  }

  currentSession = {
    phase: 'clue-giving-p2',
    p1Name: s.p2Name,
    originalP1: s.p1Name,
    p1Rounds: newRounds,
    currentRound: 0,
    usedIndices: newUsed,
    packId: s.packId || activePackId,
    history: history
  };

  showClueGiving();
}

// ============ HISTORY / SCORES ============

function showHistory(state) {
  const h = state.history || [];
  if (h.length === 0) return;

  // Need the right pack to show spectrum labels
  const packId = state.pack || activePackId || 'classic';
  const spectrums = PACKS[packId].spectrums;

  const scores = {};
  h.forEach(turn => {
    if (!scores[turn.guesser]) scores[turn.guesser] = 0;
    scores[turn.guesser] += turn.totalPts;
  });

  const players = Object.keys(scores);
  let scoresHtml = '<div class="total-scores">';
  players.forEach((p, i) => {
    scoresHtml += `<span class="${i === 0 ? 'p1' : 'p2'}">${escapeHtml(p)}: ${scores[p]} pts</span>`;
  });
  scoresHtml += '</div>';

  let turnsHtml = '';
  h.forEach((turn, ti) => {
    let roundsDetail = '';
    turn.rounds.forEach((r, ri) => {
      const spectrum = spectrums[r.si];
      roundsDetail += `
        <div class="round-result">
          <h3>Round ${ri + 1}</h3>
          <div class="clue-display">${escapeHtml(r.c)}</div>
          ${renderSpectrumBar(spectrum, { target: r.t, guess: r.g })}
          <div style="text-align:center">${pointsBadge(r.pts)}</div>
        </div>
      `;
    });

    turnsHtml += `
      <div class="card fade-in" style="animation-delay: ${ti * 0.1}s">
        <div class="history-header">
          <h3>${escapeHtml(turn.cluer)}'s clues → ${escapeHtml(turn.guesser)} guessed</h3>
          <span class="points-badge points-${turn.totalPts >= 10 ? '4' : turn.totalPts >= 6 ? '3' : turn.totalPts >= 3 ? '2' : '0'}">${turn.totalPts} pts</span>
        </div>
        ${roundsDetail}
      </div>
    `;
  });

  return { scoresHtml, turnsHtml, scores };
}

// ============ URL STATE HANDLER ============

let currentSession = null;
let sessionVars = { playerName: '' };

function handleURL() {
  const state = getStateFromURL();

  if (!state) {
    showHome();
    return;
  }

  // Restore pack from shared state
  if (state.pack && PACKS[state.pack]) {
    activePackId = state.pack;
    activePack = PACKS[state.pack];
  }

  if (state.phase === 'guess') {
    if (state.history && state.history.length > 0) {
      showHistoryThenGuess(state);
    } else {
      startGuessing(state);
    }
  }
}

function showHistoryThenGuess(state) {
  const histData = showHistory(state);
  const pack = PACKS[state.pack || 'classic'];

  app().innerHTML = `
    <div class="card fade-in">
      <h2>Game History <span style="font-size:0.85rem;color:var(--text-dim);font-weight:400;">— ${pack.icon} ${pack.name} Pack</span></h2>
      ${histData ? histData.scoresHtml : ''}
    </div>
    ${histData ? histData.turnsHtml : ''}
    <div class="card fade-in">
      <h2>Your Turn!</h2>
      <p class="instructions">${escapeHtml(state.p1Name)} has sent you ${ROUNDS_PER_TURN} new clues to guess.</p>
      <div class="btn-row">
        <button class="btn-primary" onclick="startGuessingFromHistory()">Start Guessing →</button>
      </div>
    </div>
  `;

  currentSession = { pendingState: state };
}

function startGuessingFromHistory() {
  const state = currentSession.pendingState;
  startGuessing(state);
}

// ============ INIT ============
window.addEventListener('hashchange', handleURL);
handleURL();
</script>
